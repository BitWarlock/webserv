server {
    server_name webserv;
    listen localhost:8010;

    root ./www/html;
    allowed_methods GET;
    autoindex on;
    index index.html index2.html;
    client_max_body_size 4096;

    error_page 404 405 ./error/error.html;
    error_page 500 ./error/error2.html;

    location / {
        allowed_methods GET;
    }
}
